      url: /
  description: Traverse the internal forest roads and trails of the University of Minnesota Cloquet Forestry Center, within the boundaries of the Fond du Lac Reservation. The race course traverses flat to gently rolling terrain, with mixed surfaces including mowed path, old logging railroad grades, and sandy gravel two-track road. Expect a diverse mix of managed forest conditions and occasional glimpses of wet meadows along Otter Creek.

